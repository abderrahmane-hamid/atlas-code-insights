<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Code Insights - Atlas Code Insights</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img src="assets/img/logo.png" alt="Atlas Logo" class="logo" />

        <div>
          <h1>Atlas Code Insights</h1>
          <p class="subtitle">
            Unlock the secrets of your code simply and briefly.
          </p>
        </div>

      <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
      <button id="explainBtn">Explain Code</button>

      <div id="resultArea" class="result-box"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
